<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Risely — Zaytuna College Advancement (Interactive Requirements Prototype)</title>
<style>
:root{
 color-scheme:light;
 --blue:#2563EB;--blue-d:#1D4ED8;--blue-l:#EFF4FF;--blue-l2:#DBEAFE;
 --navy:#0F172A;--slate7:#334155;--slate6:#475569;--slate5:#64748B;--slate4:#94A3B8;
 --bg:#F8FAFC;--card:#FFFFFF;--line:#E2E8F0;--line2:#F1F5F9;
 --amber-b:#FEF3C7;--amber-t:#B45309;--green-b:#DCFCE7;--green-t:#15803D;
 --red-b:#FEE2E2;--red-t:#B91C1C;--purple-b:#EDE9FE;--purple-t:#6D28D9;--sky-b:#E0F2FE;--sky-t:#0369A1;
 --r-card:16px;--r-btn:10px;
 --sh:0 1px 2px rgba(15,23,42,.04),0 1px 3px rgba(15,23,42,.06);
 --sh-lg:0 12px 34px rgba(15,23,42,.16);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--navy);font-size:14px;-webkit-font-smoothing:antialiased;line-height:1.5}
button{font-family:inherit;cursor:pointer}
a{color:inherit}
.tnum{font-variant-numeric:tabular-nums}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:6px;border:2px solid var(--bg)}

/* Topbar */
#topbar{height:62px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:18px;padding:0 20px;position:sticky;top:0;z-index:40}
.brand{display:flex;align-items:center;gap:11px;min-width:210px}
.brand .logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#3B82F6,#2563EB);display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 5px 12px rgba(37,99,235,.4)}
.brand .bt b{font-size:18px;font-weight:800;letter-spacing:-.02em;color:var(--navy);display:block;line-height:1}
.brand .bt span{font-size:11px;color:var(--slate5);font-weight:600}
.persona{display:flex;gap:3px;background:var(--bg);border:1px solid var(--line);border-radius:999px;padding:4px}
.persona button{border:none;background:transparent;border-radius:999px;padding:7px 13px;font-size:13px;font-weight:600;color:var(--slate5);display:flex;align-items:center;gap:8px;transition:.15s;white-space:nowrap}
.persona button .pdot{width:7px;height:7px;border-radius:50%;background:currentColor;opacity:.45}
.persona button.on{color:#fff;box-shadow:0 2px 7px rgba(37,99,235,.45)}
.persona button.on .pdot{opacity:1;background:#fff}
.req-pill{display:inline-flex;align-items:center;font-size:10px;font-weight:700;letter-spacing:.04em;padding:2px 7px;border-radius:999px;background:rgba(255,255,255,.25);color:inherit;margin-left:4px;cursor:pointer;border:1px solid rgba(255,255,255,.35);transition:.15s}
.persona button:not(.on) .req-pill{background:var(--blue-l);color:var(--blue-d);border-color:var(--blue-l2)}
.req-pill:hover{opacity:1;filter:brightness(1.1);transform:scale(1.06)}
.persona button:not(.on):hover{color:var(--navy);background:#fff}
.tr{margin-left:auto;display:flex;align-items:center;gap:11px}
.search{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:8px 12px;width:230px;color:var(--slate4)}
.search input{border:none;background:transparent;outline:none;font-size:13px;color:var(--navy);width:100%}
.iconbtn{position:relative;width:38px;height:38px;border-radius:10px;border:1px solid var(--line);background:#fff;display:flex;align-items:center;justify-content:center;color:var(--slate6)}
.iconbtn:hover{background:var(--bg)}
.badge-dot{position:absolute;top:-6px;right:-6px;min-width:18px;height:18px;padding:0 4px;border-radius:9px;background:#EF4444;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid #fff}
.avatar{width:38px;height:38px;border-radius:50%;color:#fff;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center}

/* Shell */
#shell{display:flex;min-height:calc(100vh - 62px)}
#sidebar{width:238px;background:#fff;border-right:1px solid var(--line);padding:16px 14px;display:flex;flex-direction:column;position:sticky;top:62px;height:calc(100vh - 62px);flex-shrink:0}
.navsec{font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--slate4);margin:16px 10px 8px}
.navitem{display:flex;align-items:center;gap:11px;padding:10px 11px;border-radius:10px;color:var(--slate6);font-weight:600;font-size:14px;cursor:pointer;margin-bottom:2px}
.navitem:hover{background:var(--line2)}
.navitem.on{background:var(--blue-l);color:var(--blue)}
.navitem svg{flex-shrink:0}
.navitem .count{margin-left:auto;font-size:12px;background:var(--line2);color:var(--slate5);border-radius:8px;padding:1px 8px;font-weight:700}
.navitem.on .count{background:#fff;color:var(--blue)}
.navitem .ncount{margin-left:auto;font-size:11px;background:#EF4444;color:#fff;border-radius:9px;padding:1px 7px;font-weight:700}
.navspacer{flex:1}
.sb-foot{border-top:1px solid var(--line2);padding-top:10px;margin-top:8px}
#main{flex:1;min-width:0}
#view{padding:24px 30px 60px;max-width:1340px}

/* Headings */
.page-h{font-size:23px;font-weight:800;letter-spacing:-.02em;color:var(--navy)}
.page-sub{color:var(--slate5);margin-top:3px;font-size:13.5px}
.hrow{display:flex;align-items:flex-start;justify-content:space-between;gap:16px}

/* Banner */
.banner{display:flex;align-items:center;gap:13px;background:var(--blue-l);border:1px solid var(--blue-l2);border-radius:14px;padding:13px 16px;margin:18px 0}
.banner .bi{width:34px;height:34px;border-radius:9px;background:#fff;display:flex;align-items:center;justify-content:center;color:var(--blue);flex-shrink:0;border:1px solid var(--blue-l2)}
.banner .btext{font-size:13.5px;color:var(--slate7);font-weight:500}
.banner .btext b{color:var(--navy);font-weight:700}
.banner .bx{margin-left:auto;display:flex;gap:8px;flex-shrink:0}

/* Tiles */
.tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;margin:16px 0}
.tile{background:#fff;border:1px solid var(--line);border-radius:var(--r-card);padding:17px 19px;box-shadow:var(--sh);transition:.15s;text-align:left}
.tile.sel{cursor:pointer}
.tile.sel:hover{border-color:#CBD5E1}
.tile.on{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-l)}
.tile .tl{color:var(--slate5);font-size:13px;font-weight:600}
.tile .tv{font-size:29px;font-weight:800;color:var(--navy);margin-top:8px;letter-spacing:-.02em}
.tile .td{font-size:12px;margin-top:5px;color:var(--slate5);font-weight:500}
.tile .td.up{color:var(--green-t)}

/* Filters */
.filters{display:flex;gap:9px;flex-wrap:wrap;margin:4px 0 16px}
.fpill{border:1px solid var(--line);background:#fff;color:var(--slate6);border-radius:999px;padding:7px 15px;font-size:13px;font-weight:600}
.fpill:hover{border-color:#CBD5E1}
.fpill.on{background:var(--blue);color:#fff;border-color:var(--blue)}

/* Card + table */
.card{background:#fff;border:1px solid var(--line);border-radius:var(--r-card);box-shadow:var(--sh);overflow:hidden}
.card+.card{margin-top:18px}
.card-h{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:15px 20px;border-bottom:1px solid var(--line2);position:relative;z-index:10}
.card-h b{font-size:15px;font-weight:700;color:var(--navy)}
.card-h .muted{color:var(--slate4);font-size:13px;font-weight:600}
.card-b{padding:20px}
table{width:100%;border-collapse:collapse}
thead th{text-align:left;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--slate4);padding:12px 20px;border-bottom:1px solid var(--line2);white-space:nowrap}
thead th.r,tbody td.r{text-align:right}
tbody td{padding:13px 20px;border-bottom:1px solid var(--line2);font-size:14px;color:var(--slate7);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr.clk:hover{background:var(--bg);cursor:pointer}
.t-name{font-weight:700;color:var(--navy)}
.t-sub{font-size:12px;color:var(--slate5);margin-top:2px;font-weight:500}
.relcell{display:flex;align-items:center;justify-content:center;gap:0;font-weight:700;color:var(--navy)}
.relcell .ric{width:24px;height:24px;border-radius:7px;background:var(--blue-l);color:var(--blue-d);display:flex;align-items:center;justify-content:center;font-size:12px}

/* Badges + buttons */
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:700;white-space:nowrap}
.b-amber{background:var(--amber-b);color:var(--amber-t)}
.b-green{background:var(--green-b);color:var(--green-t)}
.b-blue{background:var(--blue-l2);color:var(--blue-d)}
.b-slate{background:var(--line2);color:var(--slate6)}
.b-purple{background:var(--purple-b);color:var(--purple-t)}
.b-sky{background:var(--sky-b);color:var(--sky-t)}
.btn{border:none;border-radius:var(--r-btn);padding:9px 15px;font-size:13.5px;font-weight:700;display:inline-flex;align-items:center;gap:7px;white-space:nowrap}
.btn-pri{background:var(--blue);color:#fff}
.btn-pri:hover{background:var(--blue-d)}
.btn-sec{background:#fff;border:1px solid var(--line);color:var(--slate7)}
.btn-sec:hover{background:var(--bg)}
.btn-sm{padding:7px 12px;font-size:13px}
.btn-ghost{background:transparent;color:var(--blue);padding:9px 8px}
.btn[disabled]{opacity:.5;cursor:not-allowed}
.backlink{display:inline-flex;align-items:center;gap:7px;color:var(--slate5);font-weight:700;font-size:13.5px;background:none;border:none;margin-bottom:14px}
.backlink:hover{color:var(--blue)}

/* Drawer */
#scrim{position:fixed;inset:0;background:rgba(15,23,42,.35);opacity:0;pointer-events:none;transition:.2s;z-index:50}
#scrim.on{opacity:1;pointer-events:auto}
#drawer{position:fixed;top:0;right:0;height:100vh;width:430px;max-width:94vw;background:#fff;box-shadow:var(--sh-lg);transform:translateX(105%);transition:.26s cubic-bezier(.4,0,.2,1);z-index:60;display:flex;flex-direction:column}
#drawer.on{transform:none}
.dw-h{padding:20px;border-bottom:1px solid var(--line2);display:flex;gap:13px;align-items:flex-start}
.dw-body{padding:20px;overflow:auto;flex:1}
.dw-foot{padding:15px 20px;border-top:1px solid var(--line2);display:flex;gap:9px;flex-wrap:wrap}
.dw-x{margin-left:auto;background:none;border:none;color:var(--slate4);width:30px;height:30px;border-radius:8px;flex-shrink:0}
.dw-x:hover{background:var(--bg);color:var(--navy)}

/* Modal */
#modalRoot{position:fixed;inset:0;display:none;justify-content:flex-end;z-index:70}
#modalRoot.on{display:flex}
.mback{position:absolute;inset:0;background:rgba(15,23,42,.5)}
.modal{position:relative;background:#fff;border-left:1px solid var(--line);box-shadow:var(--sh-lg);width:480px;max-width:94vw;height:100vh;max-height:100vh;display:flex;flex-direction:column;overflow:hidden;animation:mslide .22s ease}
.modal.wide{width:640px}
@keyframes mslide{from{transform:translateX(30px);opacity:.5}to{transform:translateX(0);opacity:1}}
.modal-h{padding:18px 22px;border-bottom:1px solid var(--line2);display:flex;align-items:center;gap:12px}
.modal-h b{font-size:16px;font-weight:800;color:var(--navy)}
.modal-h .sub{font-size:12.5px;color:var(--slate5);font-weight:500}
.modal-b{padding:22px;overflow:auto;flex:1}
.modal-f{padding:15px 22px;border-top:1px solid var(--line2);display:flex;justify-content:flex-end;gap:10px;background:var(--bg)}
.mx{margin-left:auto;background:none;border:none;color:var(--slate4);width:32px;height:32px;border-radius:9px}
.mx:hover{background:var(--bg);color:var(--navy)}

/* Forms */
.fld{display:block;margin-bottom:15px}
.fld .lk{font-size:12.5px;font-weight:700;color:var(--slate6);margin-bottom:6px;display:block}
.input,textarea,select{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:14px;font-family:inherit;color:var(--navy);outline:none;background:#fff}
.input:focus,textarea:focus,select:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-l)}
textarea{resize:vertical;min-height:92px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
input[type=checkbox]{accent-color:var(--blue);width:16px;height:16px;cursor:pointer;vertical-align:middle}
.btn-sm.icononly{padding:7px 9px}
.selbar{display:flex;align-items:center;gap:12px;background:var(--blue-l);border:1px solid var(--blue-l2);border-radius:14px;padding:11px 16px;margin:0 0 16px}
.selbar .bx{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}
.adjbox{width:96px;border:1px solid var(--line);border-radius:8px;padding:6px 9px;font-size:13px;text-align:right;font-family:inherit;color:var(--navy);outline:none;background:#fff}
.adjbox:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-l)}
.menu{position:relative;display:inline-block}
.menu>summary{list-style:none;cursor:pointer}
.menu>summary::-webkit-details-marker{display:none}
.menu-pop{position:absolute;right:0;top:calc(100% + 6px);background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--sh-lg);padding:6px;min-width:210px;z-index:200}
.menu-item{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:8px;font-size:13.5px;font-weight:600;color:var(--slate7);cursor:pointer;white-space:nowrap}
.menu-item:hover{background:var(--bg);color:var(--navy)}

/* Record */
.rec-top{display:flex;gap:16px;align-items:flex-start;margin-bottom:6px}
.rec-av{width:62px;height:62px;border-radius:15px;color:#fff;font-size:22px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.av-ind{background:linear-gradient(135deg,#2563EB,#1D4ED8)}
.av-org{background:linear-gradient(135deg,#B07A4B,#6D4426)}
.av-fnd{background:linear-gradient(135deg,#2D6A4F,#1B4332)}
.av-hh{background:linear-gradient(135deg,#0EA5E9,#0369A1)}
.rec-cap{background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px 16px;text-align:right;box-shadow:var(--sh)}
.rec-cap .l{font-size:11px;color:var(--slate5);font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.rec-cap .v{font-size:22px;font-weight:800;color:var(--navy)}
.actionbar{display:flex;gap:9px;flex-wrap:wrap;margin:18px 0 4px}
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin:16px 0 20px;overflow-x:auto}
.tab{padding:11px 15px;font-weight:700;font-size:14px;color:var(--slate5);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap}
.tab:hover{color:var(--navy)}
.tab.on{color:var(--blue);border-color:var(--blue)}
.kv{display:grid;grid-template-columns:170px 1fr;gap:11px 16px;font-size:14px}
.kv .k{color:var(--slate5);font-weight:600}
.kv .v{color:var(--navy);font-weight:600}
.cols{display:grid;grid-template-columns:1.3fr 1fr;gap:18px;align-items:start}
.impact{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.impact .ic{border:1px solid var(--line);border-radius:12px;padding:13px 15px}
.impact .ic .l{font-size:12px;color:var(--slate5);font-weight:700}
.impact .ic .v{font-size:20px;font-weight:800;color:var(--navy);margin-top:3px}
.impact .ic.tot{background:var(--blue-l);border-color:var(--blue-l2)}
.impact .ic.tot .v{color:var(--blue-d)}

/* Hierarchy tree */
.tree{padding:8px 0}
.tnode{border:1.5px solid var(--line);border-radius:13px;padding:12px 14px;background:#fff;display:flex;gap:11px;align-items:center;box-shadow:var(--sh)}
.tnode .tic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:13px;flex-shrink:0}
.tnode .tnm{font-weight:700;color:var(--navy)}
.tnode .tmeta{font-size:12px;color:var(--slate5);font-weight:500}
.tnode .tamt{margin-left:auto;font-weight:800;color:var(--navy);text-align:right;white-space:nowrap}
.tnode.primary{border-color:var(--blue);background:var(--blue-l)}
.tchild{margin-left:30px;padding-left:24px;border-left:2px solid var(--line);margin-top:12px;display:flex;flex-direction:column;gap:12px}
.legend{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--slate6);margin-top:14px}
.legend i{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:5px;vertical-align:middle}

/* Notes / activity */
.composer{border:1px solid var(--line);border-radius:13px;padding:13px;background:#fff;margin-bottom:18px}
.mentionbar{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px;align-items:center}
.mentionbar .ml{font-size:12px;color:var(--slate5);font-weight:700;margin-right:2px}
.chip{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:5px 10px;font-size:12.5px;font-weight:600;color:var(--slate6);background:#fff}
.chip:hover{border-color:var(--blue);color:var(--blue)}
.chip .ca{width:18px;height:18px;border-radius:50%;background:var(--blue-l);color:var(--blue-d);font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center}
.note{display:flex;gap:11px;padding:13px 0;border-bottom:1px solid var(--line2)}
.note:last-child{border-bottom:none}
.note .na{width:34px;height:34px;border-radius:50%;color:#fff;font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.note .nb{flex:1}
.note .nh{display:flex;align-items:center;gap:8px;margin-bottom:2px}
.note .nh b{font-size:13.5px;color:var(--navy)}
.note .nh .nt{font-size:12px;color:var(--slate4);font-weight:500}
.note .ntext{font-size:13.5px;color:var(--slate7)}
.mention{color:var(--blue-d);font-weight:700;background:var(--blue-l);padding:0 4px;border-radius:5px}
.voice{display:flex;gap:11px;align-items:center;padding:11px 13px;border:1px solid var(--line);border-radius:12px;margin-bottom:10px;background:#fff}
.voice .vp{width:34px;height:34px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.wave{flex:1;height:24px;background:repeating-linear-gradient(90deg,var(--blue-l2) 0 3px,transparent 3px 6px);border-radius:4px;opacity:.8}

/* Kanban */
.kanban{display:grid;grid-template-columns:repeat(5,minmax(210px,1fr));gap:13px;overflow-x:auto;padding-bottom:8px}
.kcol{background:var(--bg);border:1px solid var(--line);border-radius:14px;padding:11px;min-width:210px}
.kcol-h{display:flex;align-items:center;gap:8px;padding:4px 6px 11px;font-weight:700;font-size:13px;color:var(--slate6)}
.kcol-h .kdot{width:8px;height:8px;border-radius:50%}
.kcol-h .kn{margin-left:auto;background:#fff;border:1px solid var(--line);border-radius:8px;padding:0 7px;font-size:12px;color:var(--slate5)}
.kcard{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px;box-shadow:var(--sh);cursor:pointer}
.kcard:hover{border-color:#CBD5E1}
.kcard .kt{font-weight:700;color:var(--navy);font-size:14px}
.kcard .kf{font-size:12px;color:var(--slate5);margin-top:2px}
.kcard .kamt{font-weight:800;color:var(--navy);margin-top:9px;font-size:15px}
.prob{height:6px;border-radius:3px;background:var(--line2);overflow:hidden;margin-top:9px}
.prob>i{display:block;height:100%;background:var(--blue)}
.kcard .kfoot{display:flex;align-items:center;justify-content:space-between;margin-top:9px;font-size:11.5px;color:var(--slate5)}
.kcard .kwhy{display:flex;gap:5px;align-items:flex-start;font-size:11px;color:var(--blue-d);background:var(--blue-l);border-radius:7px;padding:6px 7px;margin-top:9px;line-height:1.35}
.kcard .kwhy svg{flex:none;margin-top:1px}
.kcard .kacts{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.kbtn{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:4px;font-size:11.5px;font-weight:600;color:var(--slate6);background:#fff;border:1px solid var(--line);border-radius:7px;padding:5px 6px;cursor:pointer}
.kbtn:hover{border-color:var(--blue);color:var(--blue-d);background:var(--blue-l)}
.kcard.ai{border:1.5px dashed #C4B5FD;background:linear-gradient(180deg,#FAF5FF,#FFFFFF)}
.kcard.ai:hover{border-color:#A78BFA}
.ai-tag{display:inline-flex;align-items:center;gap:4px;font-size:9.5px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:#7C3AED;background:#F3E8FF;border-radius:20px;padding:2px 8px;margin-bottom:7px}
.ai-tag svg{flex:none}
.ai-score{font-size:11px;font-weight:700;margin-left:6px}
.kcard .aiadd{width:100%;margin-top:8px;justify-content:center}
.ai-lane-h{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:#7C3AED;margin:2px 0 9px}
.ai-lane-h svg{flex:none}
.aibrief{margin:10px 16px 4px;padding:9px 12px;background:linear-gradient(90deg,var(--blue-l),#fff);border:1px solid var(--blue-l2);border-radius:10px;font-size:12.5px;color:var(--blue-d);font-weight:600;display:flex;gap:6px;align-items:flex-start;line-height:1.4}
.rt{display:flex;gap:14px;align-items:center;padding:12px 4px;border-bottom:1px solid var(--line2);cursor:pointer}
.rt:last-child{border-bottom:none}
.rt:hover{background:var(--blue-l);border-radius:10px}
.rt-score{flex:none;width:52px;text-align:center}
.rt-score .rs-n{font-size:21px;font-weight:800;line-height:1}
.rt-score .rs-l{font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--slate5);margin-top:2px}
.rt-main{flex:1;min-width:0}
.rt-top{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.rt-top b{color:var(--navy);font-size:14px}
.rt-why{display:flex;gap:6px;align-items:flex-start;font-size:12px;color:var(--slate6);margin-top:4px;line-height:1.4}
.rt-why svg{flex:none;margin-top:2px;color:var(--blue)}
.sig{font-size:10px;font-weight:700;letter-spacing:.02em;color:var(--slate6);background:var(--bg);border:1px solid var(--line);border-radius:20px;padding:2px 8px}
.rt-right{flex:none;text-align:right;display:flex;flex-direction:column;gap:7px;align-items:flex-end}
.rt-ask{font-size:11.5px;color:var(--slate5)}.rt-ask b{display:block;color:var(--navy);font-size:15px}
.rt-acts{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.aitag{font-size:10px;font-weight:700;color:#7C3AED;background:#F3E8FF;border-radius:20px;padding:1px 7px;margin-left:6px}
.engchk{display:flex;flex-direction:column;gap:7px;padding-top:4px}
.engchk label{display:flex;gap:7px;align-items:center;font-size:13px;color:var(--navy);font-weight:500;cursor:pointer}
.nba-count{margin-left:auto;background:var(--blue);color:#fff;font-weight:800;border-radius:999px;min-width:30px;height:26px;display:inline-flex;align-items:center;justify-content:center;padding:0 10px;font-size:14px}
.rt-desc{font-size:12.5px;color:var(--slate6);margin-top:5px;line-height:1.45}
.tchip{font-size:10.5px;font-weight:800;letter-spacing:.02em;border-radius:20px;padding:2px 9px;white-space:nowrap}
.tagwrap{display:flex;flex-wrap:wrap;gap:4px;max-width:240px}
.sig-zip{color:#7C3AED;background:#F3E8FF;border-color:#E9D5FF}
.cellsel{font-size:12px;font-weight:600;color:var(--navy);background:#fff;border:1px solid var(--line);border-radius:8px;padding:5px 8px;max-width:150px;cursor:pointer}
.cellsel:hover{border-color:var(--blue)}
.cellsel.un{color:var(--slate5);font-weight:500}
.askbar{display:flex;gap:10px}
.askbar .input{flex:1}
.askq{display:flex;gap:8px;align-items:center;font-weight:700;color:var(--navy);font-size:14px}
.askq svg{color:var(--slate5);flex:none}
.aska{display:flex;gap:10px;margin-top:13px;padding-top:13px;border-top:1px solid var(--line2)}
.aska>svg{color:#7C3AED;flex:none;margin-top:2px}
.aians{font-size:14px;color:var(--slate7);line-height:1.55}
.aiul,.aiol{margin:8px 0 0;padding-left:20px;display:flex;flex-direction:column;gap:5px}
.aimore{margin-top:10px;font-size:13px;color:var(--slate6)}
.ailink{color:var(--blue-d);font-weight:700;cursor:pointer;text-decoration:underline}
.uav{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;color:#fff;font-size:11px;font-weight:800;margin-right:9px;vertical-align:middle}
.prepgrid{display:grid;grid-template-columns:auto 1fr;gap:7px 16px}
.prepgrid .pk{color:var(--slate5);font-size:13px}
.prepgrid .pv{color:var(--navy);font-weight:600;font-size:13px}
.prepsec{margin-top:15px;padding-top:13px;border-top:1px solid var(--line2)}
.prep-h{display:flex;gap:6px;align-items:center;font-size:11px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:#7C3AED;margin-bottom:8px}
.prep-h svg{flex:none}
.menu-lbl{padding:7px 12px 3px;font-size:10px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--slate5);border-top:1px solid var(--line2);margin-top:4px}
.scorepill{display:inline-flex;align-items:center;justify-content:center;min-width:32px;height:24px;border:1.5px solid;border-radius:7px;font-weight:800;font-size:13px}
.hstats{display:flex;gap:10px;flex-wrap:wrap}
.hstat{background:#fff;border:1px solid var(--line);border-radius:12px;padding:9px 15px;box-shadow:var(--sh);text-align:left;min-width:118px}
.hstat .hl{font-size:11px;color:var(--slate5);font-weight:600;margin-bottom:2px}
.hstat .hv{font-size:20px;font-weight:800;color:var(--navy)}
.hstat .hv span{font-size:12px;font-weight:600;color:var(--slate5)}
.miniav{width:22px;height:22px;border-radius:50%;background:var(--blue-l);color:var(--blue-d);font-size:10px;font-weight:800;display:inline-flex;align-items:center;justify-content:center}

/* Analytics bars */
.bar-row{display:grid;grid-template-columns:150px 1fr 96px;align-items:center;gap:14px;margin-bottom:11px}
.bar-row .bl{font-weight:700;color:var(--navy);font-size:13.5px}
.bar-row .bl small{display:block;color:var(--slate5);font-weight:500;font-size:11.5px}
.bar{height:24px;background:var(--line2);border-radius:7px;overflow:hidden}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,#60A5FA,#2563EB);border-radius:7px}
.bar-row .bv{text-align:right;font-weight:800;color:var(--navy);font-size:13.5px}

/* Wizard */
.steps{display:flex;gap:8px;margin-bottom:20px}
.step{flex:1;display:flex;align-items:center;gap:9px;padding:10px 12px;border:1px solid var(--line);border-radius:11px;font-size:12.5px;font-weight:700;color:var(--slate5)}
.step .sn{width:22px;height:22px;border-radius:50%;background:var(--line2);color:var(--slate6);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.step.on{border-color:var(--blue);color:var(--blue);background:var(--blue-l)}
.step.on .sn{background:var(--blue);color:#fff}
.step.done .sn{background:var(--green-t);color:#fff}
.slidegrid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px}
.slidethumb{border:1px solid var(--line);border-radius:11px;overflow:hidden;background:#fff}
.slidethumb .sthead{height:64px;background:linear-gradient(135deg,#1D4ED8,#2563EB);color:#fff;display:flex;align-items:flex-end;padding:9px 11px;font-weight:800;font-size:12.5px}
.slidethumb .stbody{padding:9px 11px;font-size:11.5px;color:var(--slate5)}
.optrow{display:flex;align-items:center;gap:11px;padding:11px 13px;border:1px solid var(--line);border-radius:11px;margin-bottom:9px;cursor:pointer}
.optrow:hover{border-color:#CBD5E1}
.optrow.on{border-color:var(--blue);background:var(--blue-l)}
.optrow .ck{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff}
.optrow.on .ck{background:var(--blue);border-color:var(--blue)}
.recbtn{width:88px;height:88px;border-radius:50%;background:var(--blue);color:#fff;border:none;display:flex;align-items:center;justify-content:center;margin:8px auto;box-shadow:0 8px 22px rgba(37,99,235,.4)}
.recbtn.rec{background:#EF4444;animation:pulse 1.2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(239,68,68,.5)}70%{box-shadow:0 0 0 16px rgba(239,68,68,0)}100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}}

/* Toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy);color:#fff;padding:13px 18px;border-radius:12px;font-weight:600;font-size:13.5px;box-shadow:var(--sh-lg);opacity:0;pointer-events:none;transition:.22s;z-index:90;display:flex;align-items:center;gap:10px;max-width:90vw}
#toast.on{opacity:1;transform:translateX(-50%)}
#toast .tk{width:22px;height:22px;border-radius:50%;background:var(--green-t);display:flex;align-items:center;justify-content:center;flex-shrink:0}

.empty{text-align:center;padding:50px 20px;color:var(--slate5)}
.empty .ei{width:54px;height:54px;border-radius:14px;background:var(--blue-l);color:var(--blue);display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.note-banner{font-size:12px;color:var(--slate5);background:var(--bg);border:1px dashed var(--line);border-radius:10px;padding:9px 12px;margin-top:12px}
.protochip{position:fixed;bottom:18px;left:18px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:7px 13px;font-size:12px;font-weight:700;color:var(--slate6);box-shadow:var(--sh);z-index:30;display:flex;align-items:center;gap:7px}
.protochip i{width:8px;height:8px;border-radius:50%;background:#22C55E;display:inline-block}
@media(max-width:1100px){.tiles{grid-template-columns:repeat(2,1fr)}.cols{grid-template-columns:1fr}.search{display:none}}
@media(max-width:780px){#sidebar{display:none}.persona button span.plabel{display:none}}
</style>
</head>

/* ---------- Money helpers ---------- */
function usd(n){return '$'+Math.round(n).toLocaleString('en-US');}
function usdK(n){if(n>=1e6)return '$'+(n/1e6).toFixed(n%1e6?1:0)+'M';if(n>=1e3)return '$'+Math.round(n/1e3)+'K';return '$'+n;}

/* ---------- DOM helpers ---------- */
const $=s=>document.querySelector(s);
function setHTML(sel,html){const n=$(sel);if(n)n.innerHTML=html;}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}

/* ---------- Toast ---------- */
let toastT;
function toast(msg,icon){
 const t=$('#toast');
 t.innerHTML='<span class="tk">'+ic(icon||'check',13)+'</span>'+esc(msg);
 t.classList.add('on');clearTimeout(toastT);
 toastT=setTimeout(()=>t.classList.remove('on'),2600);
}

function creditBadge(c){

 if(/Soft/.test(c))return '<span class="badge b-sky">'+esc(c)+'</span>';
 return '<span class="badge b-blue">'+esc(c)+'</span>';
}
function typeBadge(t){
 const m={Individual:'b-blue',Organization:'b-slate',Foundation:'b-green',Household:'b-sky'};
 return '<span class="badge '+(m[t]||'b-slate')+'">'+esc(t)+'</span>';
}
function avClass(t){return t==='Organization'?'av-org':t==='Foundation'?'av-fnd':t==='Household'?'av-hh':'av-ind';}
function initials(n){return n.split(' ').filter(w=>/[A-Za-z]/.test(w[0])).slice(0,2).map(w=>w[0]).join('').toUpperCase();}
function can(a){return PERSONAS[state.persona].actions.includes(a);}

function renderSidebar(){
 const allow=PERSONAS[state.persona].views;
 let h='';
 NAV.forEach(sec=>{
   const items=sec.items.filter(i=>allow.includes(i.k));
   if(!items.length)return;
   h+='<div class="navsec">'+sec.sec+'</div>';
   items.forEach(i=>{
     const on=state.view===i.k||(state.view==='record'&&i.k==='constituents');
     let badge='';
     if(i.k==='inbox'){const u=INBOX.filter(x=>x.to===state.persona&&!x.read).length;if(u)badge='<span class="ncount">'+u+'</span>';}
     if(i.k==='pipeline'){const n=C.filter(c=>c.stage&&c.stage!=='stewardship').length;badge='<span class="count">'+n+'</span>';}
     h+='<div class="navitem '+(on?'on':'')+'" onclick="go(\''+i.k+'\')">'+ic(i.icon)+'<span>'+i.label+'</span>'+badge+'</div>';
   });
 });
 h+='<div class="navspacer"></div><div class="sb-foot"><div class="navitem '+(state.view==='summary'?'on':'')+'" onclick="go(\'summary\')">'+ic('list')+'<span>Summary</span></div><div class="navitem" onclick="toast(\'Prototype — sign out is illustrative\')">'+ic('logout')+'<span>Sign out</span></div></div>';
 $('#sidebar').innerHTML=h;
}

/* ---------- Router ---------- */
function go(v){state.view=v;state.recordId=null;closeDrawer();render();window.scrollTo(0,0);}
function setPersona(p){
 if(!PERSONAS[p])return;
 state.persona=p;
 // keep current view if allowed; record view always allowed (constituents in every persona)
 if(state.view!=='record' && state.view!=='forecastRec' && state.view!=='summary' && state.view!=='gift' && !PERSONAS[p].views.includes(state.view))state.view='dashboard';
 closeDrawer();render();
 toast('Now viewing as '+PERSONAS[p].label+' — '+PERSONAS[p].sub,'user');
}
function render(){
 renderTop();renderSidebar();
 const v=state.view;
 if(v==='record')return renderRecord();
 if(v==='dashboard')return renderDashboard();
 if(v==='constituents')return renderConstituents();
 if(v==='hierarchies')return renderHierarchies();
 if(v==='pipeline')return renderPipeline();
 if(v==='nba')return renderNBA();
 if(v==='gifts')return renderGifts();
 if(v==='payments')return renderPayments();
 if(v==='events')return renderEvents();
 if(v==='bookstore')return renderBookstore();
 if(v==='courses')return renderCourses();
 if(v==='lists')return renderLists();
 if(v==='analytics')return renderAnalytics();
 if(v==='askai')return renderAskAI();
 if(v==='users')return renderUsers();
 if(v==='inbox')return renderInbox();
 if(v==='dataquality')return renderDataQuality();
 if(v==='forecast')return renderForecast();
 if(v==='forecastRec')return renderForecastRec();
 if(v==='settings')return renderSettings();
 if(v==='uploads')return renderUploads();
 if(v==='summary')return renderSummary();
 if(v==='gift')return renderGift();
}

function aiAnswer(q){
 const s=(q||'').toLowerCase();
 if(s.includes('priorit')||s.includes('next best')||s.includes('who should')||s.includes('focus')||s.includes('work on')){
   const top=NBA.slice().sort((a,b)=>b.score-a.score).slice(0,4);
   return 'Your highest-impact next actions right now:<ol class="aiol">'+top.map(x=>'<li><b>'+esc(x.name)+'</b> · '+x.score+' match · '+esc(x.type)+' — '+esc(x.desc)+'</li>').join('')+'</ol><div class="aimore">Open <a class="ailink" onclick="go(\'nba\')">Next Best Action</a> to work the full list.</div>';
 }
 if(s.includes('zip')||s.includes('high-capacity')||s.includes('high capacity')||s.includes('wealth')||s.includes('capacity')){
   const z=NBA.filter(x=>nbaTags(x).indexOf('High-capacity ZIP')>=0);
   return z.length+' people are flagged in high-capacity ZIP codes (Atherton, Los Altos Hills, Palo Alto, Belvedere, Berkeley):<ul class="aiul">'+z.map(x=>'<li><b>'+esc(x.name)+'</b> — '+esc(x.desc)+'</li>').join('')+'</ul><div class="aimore">Filter <a class="ailink" onclick="go(\'nba\')">Next Best Action</a> by the “High-capacity ZIP” signal.</div>';
 }
 if(s.includes('rais')||s.includes('qtd')||s.includes('ytd')||s.includes('this quarter')||s.includes('this year')||s.includes('how much')||s.includes('total')){
   const qg=giftsInRange('qtd',null),yg=giftsInRange('ytd',null);
   return 'Across all funds: <b>'+usd(qg.reduce((a,g)=>a+g.amount,0))+'</b> closed this quarter ('+qg.length+' gifts) and <b>'+usd(yg.reduce((a,g)=>a+g.amount,0))+'</b> year to date ('+yg.length+' gifts).';
 }
 if(s.includes('laps')||s.includes('re-engage')||s.includes('reengage')||s.includes('churn')||s.includes('win back')||s.includes('win-back')||s.includes('cold')){
   const l=NBA.filter(x=>['Lapsing','Lapsed','Recover','Re-engage'].some(t=>nbaTags(x).indexOf(t)>=0));
   return 'Donors worth a re-engagement touch:<ul class="aiul">'+l.map(x=>'<li><b>'+esc(x.name)+'</b> — '+esc(x.desc)+'</li>').join('')+'</ul>';
 }
 if(s.includes('pledge')||s.includes('overdue')||s.includes('due')){
   const pd=PLEDGES.filter(p=>p.status!=='Scheduled'),od=pd.filter(p=>p.status==='Overdue');
   return pd.length+' pledges are coming due ('+usd(pd.reduce((a,p)=>a+p.amount,0))+' total'+(od.length?', '+od.length+' overdue':'')+'):<ul class="aiul">'+pd.map(p=>'<li><b>'+esc(p.donor)+'</b> — '+usd(p.amount)+' '+esc(p.fund)+' · due '+esc(p.due)+' · '+esc(p.status)+'</li>').join('')+'</ul>';
 }
 if(s.includes('pipeline')||s.includes('forecast')||s.includes('weighted')||s.includes('solicit')){
   return 'Pipeline is <b>'+usdK(pipelineTotal())+'</b> across '+prospects().length+' opportunities, with a probability-weighted forecast of <b>'+usdK(pipelineWeighted())+'</b>. '+C.filter(c=>c.stage==='solicitation').length+' asks are out now. Open the <a class="ailink" onclick="go(\'pipeline\')">Pipeline</a>.';
 }
 if(s.includes('recurring')||s.includes('mrr')||s.includes('sustain')||s.includes('monthly')){
   return 'Recurring giving: <b>'+usd(REC.mrr)+'</b> MRR from '+REC.active.toLocaleString()+' active monthly donors (≈ '+usdK(REC.annual)+' annual run-rate). +'+REC.newM+' new and −'+REC.churnedM+' churned this month.';
 }
 if(s.includes('event')||s.includes('bookstore')||s.includes('course')||s.includes('thinkific')||s.includes('attend')||s.includes('engag')){
   const ev=C.filter(c=>(c.events||[]).length).length,bk=C.filter(c=>(c.books||[]).length).length,co=C.filter(c=>(c.courses||[]).length).length;
   return ev+' constituents have attended an event, '+bk+' have bought from the bookstore, and '+co+' are enrolled in a course (all matched by email). Build a segment in <a class="ailink" onclick="go(\'lists\')">Lists</a>.';
 }
 if(s.includes('list')||s.includes('segment')||s.includes('mailchimp')||s.includes('blast')){
   return 'Use <a class="ailink" onclick="go(\'lists\')">Lists</a> to segment by type, lifetime giving, ZIP, or engagement signal — then push to Mailchimp or send a bulk message.';
 }
 const named=C.find(c=>s.includes(c.name.toLowerCase())||(c.name.split(' ')[0].length>=4&&s.includes(c.name.split(' ')[0].toLowerCase())));
 if(named){const c=named;
   return 'Snapshot of <a class="ailink" onclick="openRecord(\''+c.id+'\')">'+esc(c.name)+'</a>:<ul class="aiul"><li>Lifetime giving '+usd(c.lifetime)+' · FY25 '+usd(c.fy25)+'</li><li>Capacity '+esc(c.capacity)+(HIGH_ZIPS[c.zip]?' · <b>High-capacity ZIP</b> ('+esc(HIGH_ZIPS[c.zip])+')':'')+'</li>'+(c.stage?'<li>Pipeline: '+stageObj(c.stage).name+' · '+usd(c.ask)+' for '+esc(c.fundInterest)+'</li>':'')+'<li>Engagement: '+(c.events||[]).length+' events · '+(c.courses||[]).length+' courses · '+(c.books||[]).length+' bookstore</li>'+(c.officer?'<li>Gift officer: '+esc(c.officer)+'</li>':'')+'</ul>';
 }
 return 'I can answer questions about donors, pipeline, gifts, pledges, recurring giving, engagement, and high-capacity ZIP prospects. Try “Who should I prioritize this week?”, “How much have we raised this quarter?”, or “Summarize Ahmad Al-Rashid.”';
}

 const cats='<div class="tabs" style="margin-top:6px"><div class="tab '+(cat==='mentions'?'on':'')+'" onclick="state.inboxCat=\'mentions\';render()">Mentions'+(unread?' <span class="badge b-blue" style="margin-left:5px">'+unread+'</span>':'')+'</div>'+(showBulk?'<div class="tab '+(cat==='bulk'?'on':'')+'" onclick="state.inboxCat=\'bulk\';render()">Bulk Sends <span class="badge b-slate" style="margin-left:5px">'+BULK_SENDS.length+'</span></div>':'')+'</div>';
 let body;
 if(cat==='bulk'&&showBulk){
   if(!BULK_SENDS.length)body='<div class="card"><div class="empty"><div class="ei">'+ic('send',24)+'</div><div style="font-weight:700;color:var(--navy)">No bulk sends yet</div><div>Send a bulk message from Lists or a Constituents selection — it is logged here.</div></div></div>';
   else body='<div class="card"><div class="card-h"><b>Bulk send history</b><span class="muted">'+BULK_SENDS.length+' sends</span></div><div style="overflow-x:auto"><table><thead><tr><th>Sent</th><th>Subject</th><th>Channel</th><th>List</th><th class="r">Recipients</th><th class="r">Action</th></tr></thead><tbody>'+BULK_SENDS.map(b=>{const f=TEAM.find(t=>t.id===b.by)||{name:'User'};return '<tr><td>'+esc(b.date)+'<div class="t-sub">'+esc(b.time)+' · '+esc(f.name)+'</div></td><td class="t-name">'+esc(b.subject)+'</td><td>'+esc(b.channel)+'</td><td>'+esc(b.list||'—')+'</td><td class="r tnum">'+b.recipients.length+'</td><td class="r"><button class="btn btn-sec btn-sm" onclick="viewBulk(\''+b.id+'\')">View recipients</button></td></tr>';}).join('')+'</tbody></table></div></div>';
 }else{
   const readCount=all.length-unread;const items=state.inboxFilter==='read'?all.filter(i=>i.read):all.filter(i=>!i.read);
   const fl='<div style="display:flex;align-items:center;gap:9px;margin:16px 0 8px"><span style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--slate5)">Show</span><button class="fpill '+(state.inboxFilter!=='read'?'on':'')+'" onclick="state.inboxFilter=\'unread\';render()">Unread ('+unread+')</button><button class="fpill '+(state.inboxFilter==='read'?'on':'')+'" onclick="state.inboxFilter=\'read\';render()">Read ('+readCount+')</button></div>';
   let mb;
   if(!items.length)mb='<div class="card"><div class="empty"><div class="ei">'+ic('inbox',24)+'</div><div style="font-weight:700;color:var(--navy)">You’re all caught up</div><div>@mentions addressed to you will appear here for review.</div></div></div>';
   else mb='<div class="card">'+items.map(it=>{const from=TEAM.find(t=>t.id===it.from)||{name:'User',initials:'U',color:'#64748B'};const c=byId(it.did);const gi=INBOX.indexOf(it);
     return '<div class="note" style="padding:16px 20px;'+(!it.read?'background:var(--blue-l)':'')+'"><div class="na" style="background:'+from.color+'">'+from.initials+'</div><div class="nb"><div class="nh"><b>'+esc(from.name)+'</b><span class="nt">'+esc(it.time)+'</span>'+(!it.read?' <span class="badge b-blue">New</span>':'')+'</div><div class="ntext">'+fmtMentions(it.text)+'</div><div style="margin-top:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap"><span class="t-sub">Re: '+(c?esc(c.name):'—')+'</span><button class="btn btn-pri btn-sm" onclick="respondInbox('+gi+')">'+ic('send',13)+'Respond</button><button class="btn btn-sec btn-sm" onclick="reviewInbox('+gi+')">Review on record</button>'+(!it.read?'<button class="btn btn-sec btn-sm" onclick="markRead('+gi+')">Mark read</button>':'')+'</div></div></div>';
   }).join('')+'</div>';
   body=fl+mb;
 }
 setHTML('#view',header('Actions','Mentions and responses — write back to the gift or constituent · '+me.name)+cats+body);
}
function reviewInbox(i){const it=INBOX[i];if(!it)return;it.read=true;var o=it.origin;if(o&&o.type==='gift')return openGift(o.id);if(o&&o.type==='opportunity'){openRecord(it.did);setTimeout(function(){setTab('opportunities');},30);return;}openRecord(it.did);}
function originLabel(o,c){if(o&&o.type==='gift')return 'gift '+(o.label||'');if(o&&o.type==='opportunity')return 'opportunity “'+(o.label||'')+'”';return c?c.name+'’s record':'the record';}
function markRead(i){const it=INBOX[i];if(it)it.read=true;render();}
function respondInbox(i){var it=INBOX[i];if(!it)return;var from=TEAM.find(function(t){return t.id===it.from;})||{name:'User',initials:'U',color:'#64748B'};var c=byId(it.did);var oLab=originLabel(it.origin,c);
 openModal('<div class="modal"><div class="modal-h">'+ic('send',20)+'<div><b>Respond to action</b><div class="sub">From '+esc(from.name)+' · posts back to '+esc(oLab)+'</div></div><button class="mx" onclick="closeModal()">'+ic('x',18)+'</button></div>'
  +'<div class="modal-b"><div class="note" style="border-bottom:none;padding:0 0 12px"><div class="na" style="background:'+(from.color||'#64748B')+'">'+(from.initials||'U')+'</div><div class="nb"><div class="nh"><b>'+esc(from.name)+'</b><span class="nt">'+esc(it.time)+'</span></div><div class="ntext">'+fmtMentions(it.text)+'</div></div></div>'
  +'<label class="fld"><span class="lk">Your response</span><textarea id="invReply" style="min-height:110px" placeholder="Type your response…"></textarea></label>'
  +'<div class="note-banner">'+ic('link',13)+' Your response posts back to the origin — '+esc(oLab)+' — as an action note, and returns to '+esc(from.name.split(' ')[0])+'’s inbox.</div>'
  +'</div><div class="modal-f"><button class="btn btn-sec" onclick="closeModal()">Cancel</button><button class="btn btn-pri" onclick="sendInboxResponse('+i+')">'+ic('send',15)+'Send response</button></div></div>');
}
function sendInboxResponse(i){var it=INBOX[i];if(!it)return;var reply=$('#invReply')?$('#invReply').value.trim():'';if(!reply){toast('Write a response first');return;}var c=byId(it.did);var me=memberByPersona(state.persona);var from=TEAM.find(function(t){return t.id===it.from;})||{name:'User',persona:'director'};var o=it.origin;
 it.read=true;
 if(c){c.notes=c.notes||[];var pre=(o&&o.type==='gift')?'Re: gift '+(o.label||'')+' — ':((o&&o.type==='opportunity')?'Re: opportunity “'+(o.label||'')+'” — ':'Responded to '+from.name+': ');c.notes.push({by:me.id,text:pre+reply,time:'Just now · PT',actionType:'action',opportunity:((o&&o.type==='opportunity')?o.label:undefined)});}
 if(o&&o.type==='gift'){var g=GIFTS.filter(function(x){return x.id===o.id;})[0];if(g){g.comments=g.comments||[];g.comments.push({by:me.id,text:reply,time:'Just now · PT'});}}
 INBOX.unshift({to:from.persona,from:me.id,did:it.did,origin:it.origin,text:'@'+from.name+' '+reply,time:'Just now · PT',read:false});
 closeModal();toast('Response posted to '+originLabel(o,c)+' and sent to '+from.name.split(' ')[0],'send');
 render();
}

/* ============================ NOTES + @MENTION ============================ */
function insertMention(name){const ta=$('#noteInput');if(!ta)return;ta.value+=(ta.value&&!/\s$/.test(ta.value)?' ':'')+'@'+name+' ';ta.focus();}
function postNote(){
 const ta=$('#noteInput');if(!ta)return;const text=ta.value.trim();if(!text){toast('Write a note first');return;}
 const c=byId(state.recordId);const me=memberByPersona(state.persona);
 c.notes=c.notes||[];c.notes.push({by:me.id,text:text,time:'Just now · PT'});
 const mentioned=TEAM.filter(t=>t.persona!==state.persona&&text.indexOf('@'+t.name)>=0);
 mentioned.forEach(m=>INBOX.unshift({to:m.persona,from:me.id,did:c.id,text:text,time:'Just now · PT',read:false}));
 renderRecord();
 toast(mentioned.length?'Note posted · '+mentioned.length+' teammate'+(mentioned.length>1?'s':'')+' notified in Inbox':'Note posted','send');
}

/* ============================ EMAIL ============================ */
function openEmail(id){const c=byId(id);const me=memberByPersona(state.persona);
 openModal('<div class="modal"><div class="modal-h">'+ic('mail',20)+'<div><b>New email</b><div class="sub">To '+esc(c.name)+'</div></div><button class="mx" onclick="closeModal()">'+ic('x',18)+'</button></div>'
  +'<div class="modal-b"><label class="fld"><span class="lk">To</span><input class="input" id="emTo" value="'+esc(c.email)+'"></label>'
  +'<label class="fld"><span class="lk">Subject</span><input class="input" id="emSub" value="Following up — Zaytuna College"></label>'
  +'<label class="fld"><span class="lk">Message</span><textarea id="emBody" style="min-height:160px">Dear '+esc(c.name.split(' ')[0])+',\n\nThank you for your continued partnership with Zaytuna College. I would love to find time to share an opportunity I think will resonate with you.\n\nWarm regards,\n'+esc(me.name)+'\n'+esc(me.role)+'</textarea></label></div>'

function sendEmail(id){const c=byId(id);const me=memberByPersona(state.persona);const sub=($('#emSub')?$('#emSub').value:'');
 c.notes=c.notes||[];c.notes.push({by:me.id,text:'Sent email — “'+sub+'” to '+c.email,time:'Just now · PT'});
 closeModal();toast('Email sent to '+c.email,'mail');
 if(state.view==='record'&&state.tab==='notes')renderRecord();
}

/* ============================ PRESENTATION WIZARD ============================ */
const SLIDE_OPTS=[
 {k:'cover',t:'Cover',d:'Donor name, project, Zaytuna brand'},
 {k:'profile',t:'Donor profile',d:'Relationship, roles, capacity'},
 {k:'history',t:'Giving history',d:'Past gifts and cumulative impact'},
 {k:'opp',t:'The opportunity',d:'Project narrative and vision'},
 {k:'budget',t:'Budget & naming',d:'Cost breakdown and naming tiers'},
 {k:'impact',t:'Impact',d:'Students served and outcomes'},
 {k:'ask',t:'The ask',d:'Specific gift request'},
 {k:'next',t:'Next steps',d:'Timeline and follow-up'}
];
function openWizard(id){const c=byId(id);
 state.wizard={id:id,step:1,slides:SLIDE_OPTS.map(s=>s.k),
   ctx:{prospect:c.name,
     context:(c.fundInterest&&/Residence/.test(c.fundInterest))?'Acquisition of a residence to house Graduate Program women — the Rihla House':'Endowment to permanently fund student scholarships',
     ask:c.ask||100000}};
 renderWizard();
}
function renderWizard(){
 const w=state.wizard;const c=byId(w.id);const labels=['Context','Slides','Generate'];
 const steps='<div class="steps">'+labels.map((s,i)=>{const n=i+1;return '<div class="step '+(w.step===n?'on':(w.step>n?'done':''))+'"><span class="sn">'+(w.step>n?ic('check',13):n)+'</span>'+s+'</div>';}).join('')+'</div>';
 let body,foot;
 if(w.step===1){
   body='<label class="fld"><span class="lk">Prospect</span><input class="input" id="wzProspect" value="'+esc(w.ctx.prospect)+'"></label>'
    +'<label class="fld"><span class="lk">Opportunity context</span><textarea id="wzCtx">'+esc(w.ctx.context)+'</textarea></label>'
    +'<label class="fld"><span class="lk">Ask amount</span><input class="input" id="wzAsk" value="'+usd(w.ctx.ask)+'"></label>'
    +'<div class="note-banner">The wizard pulls '+esc(c.name)+'’s relationships, giving history and capacity from the record to pre-fill the proposal.</div>';
   foot='<button class="btn btn-sec" onclick="closeModal()">Cancel</button><button class="btn btn-pri" onclick="wizardNext()">Continue</button>';
 }else if(w.step===2){
   body='<div style="font-weight:700;margin-bottom:12px;color:var(--navy)">Choose slides ('+w.slides.length+' selected)</div>'+SLIDE_OPTS.map(s=>{const on=w.slides.includes(s.k);return '<div class="optrow '+(on?'on':'')+'" onclick="toggleSlide(\''+s.k+'\')"><div class="ck">'+(on?ic('check',13):'')+'</div><div><div style="font-weight:700;color:var(--navy)">'+s.t+'</div><div class="t-sub">'+s.d+'</div></div></div>';}).join('');
   foot='<button class="btn btn-sec" onclick="wizardBack()">Back</button><button class="btn btn-pri" onclick="wizardNext()">'+ic('spark',15)+'Generate deck</button>';
 }else{
   const idx=Math.min(w.slideIdx||0,w.slides.length-1);const sk=w.slides[idx];const ss=SLIDE_OPTS.find(x=>x.k===sk);
   const dots=w.slides.map((kk,i)=>'<span onclick="wizGoto('+i+')" title="'+esc(SLIDE_OPTS.find(x=>x.k===kk).t)+'" style="display:inline-block;width:9px;height:9px;border-radius:50%;cursor:pointer;background:'+(i===idx?'var(--blue)':'var(--line)')+'"></span>').join('');
   body='<div style="border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--sh)"><div style="background:linear-gradient(135deg,#1D4ED8,#2563EB);color:#fff;padding:26px 30px;min-height:118px;display:flex;flex-direction:column;justify-content:flex-end"><div style="font-size:11.5px;letter-spacing:.12em;text-transform:uppercase;opacity:.85">Zaytuna College · Advancement · Slide '+(idx+1)+' of '+w.slides.length+'</div><div style="font-size:26px;font-weight:800;margin-top:8px">'+ss.t+'</div></div><div style="padding:24px 30px;font-size:16px;color:var(--slate7);min-height:108px">'+esc(slidePreview(sk,c,w))+'</div></div>'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-top:14px"><button class="btn btn-sec btn-sm" '+(idx===0?'disabled':'')+' onclick="wizSlide(-1)">'+ic('back',14)+'Prev</button><div style="display:flex;gap:7px;align-items:center">'+dots+'</div><button class="btn btn-sec btn-sm" '+(idx>=w.slides.length-1?'disabled':'')+' onclick="wizSlide(1)">Next '+ic('chev',14)+'</button></div>'
    +'<div class="note-banner" style="margin-top:14px">Generated a '+w.slides.length+'-slide proposal for '+esc(c.name)+' — step through slide by slide, then download, open in O365 or send.</div>';
   foot='<button class="btn btn-sec" onclick="wizardBack()">Back</button><button class="btn btn-sec" onclick="downloadDeck()">'+ic('download',15)+'Download</button><button class="btn btn-sec" onclick="openO365()">'+ic('slides',15)+'Open in O365</button><button class="btn btn-sec" onclick="saveDeck()">Save</button><button class="btn btn-pri" onclick="sendDeck()">'+ic('send',15)+'Send to donor</button>';
 }
 openModal('<div class="modal wide"><div class="modal-h">'+ic('slides',20)+'<div><b>Donor presentation wizard</b><div class="sub">'+esc(c.name)+'</div></div><button class="mx" onclick="closeModal()">'+ic('x',18)+'</button></div><div class="modal-b">'+steps+body+'</div><div class="modal-f">'+foot+'</div></div>');
}
function slidePreview(k,c,w){
 if(k==='cover')return 'Zaytuna College · '+w.ctx.context.split('—')[0].trim();
 if(k==='profile')return c.title+' · '+c.capacity+' capacity · '+c.rel+' relationships';
 if(k==='history')return (c.giving||[]).length+' gifts · '+usd((c.giving||[]).reduce((s,x)=>s+x.amount,0))+' lifetime to date';
 if(k==='opp')return w.ctx.context;
 if(k==='budget')return 'Naming tiers from '+usd(Math.round(w.ctx.ask*0.5))+' to '+usd(w.ctx.ask);
 if(k==='impact')return 'Graduate women housed, scholarships funded, lasting community impact';
 if(k==='ask')return 'Proposed gift: '+usd(w.ctx.ask);
 if(k==='next')return 'Campus visit · gift agreement · stewardship plan';
 return '';
}
function readWizardCtx(){const w=state.wizard;if($('#wzProspect'))w.ctx.prospect=$('#wzProspect').value;if($('#wzCtx'))w.ctx.context=$('#wzCtx').value;if($('#wzAsk'))w.ctx.ask=parseInt(($('#wzAsk').value||'0').replace(/[^0-9]/g,''))||w.ctx.ask;}
function wizardNext(){readWizardCtx();state.wizard.step++;state.wizard.slideIdx=0;renderWizard();}
function wizardBack(){state.wizard.step--;renderWizard();}
function wizSlide(d){const w=state.wizard;if(!w)return;w.slideIdx=Math.max(0,Math.min((w.slideIdx||0)+d,w.slides.length-1));renderWizard();}
function wizGoto(i){const w=state.wizard;if(!w)return;w.slideIdx=i;renderWizard();}
function toggleSlide(k){const w=state.wizard;w.slides=w.slides.includes(k)?w.slides.filter(x=>x!==k):SLIDE_OPTS.map(s=>s.k).filter(x=>w.slides.includes(x)||x===k);renderWizard();}
function saveDeck(){const w=state.wizard;const c=byId(w.id);const me=memberByPersona(state.persona);c.presentations=c.presentations||[];c.presentations.push({title:w.ctx.context,by:me.id,date:'Just now · PT',status:'Saved',ask:w.ctx.ask});c.notes=c.notes||[];c.notes.push({by:me.id,text:'Created a '+w.slides.length+'-slide proposal deck — “'+w.ctx.context+'” (ask '+usd(w.ctx.ask)+')',time:'Just now · PT'});closeModal();toast('Deck saved to '+c.name+'’s record','slides');state.tab='presentations';if(state.view==='record')renderRecord();}
function downloadDeck(){const w=state.wizard;const c=byId(w.id);const me=memberByPersona(state.persona);c.presentations=c.presentations||[];c.presentations.push({title:w.ctx.context,by:me.id,date:'Just now · PT',status:'Downloaded',ask:w.ctx.ask});downloadBlob('Risely_'+c.name.replace(/[^A-Za-z0-9]+/g,'_')+'_Proposal.html',deckHTML(c,w),'text/html');toast('Proposal downloaded · '+w.slides.length+' slides','download');}
function sendDeck(){const w=state.wizard;const c=byId(w.id);const me=memberByPersona(state.persona);c.presentations=c.presentations||[];c.presentations.push({title:w.ctx.context,by:me.id,date:'Just now · PT',status:'Sent',ask:w.ctx.ask});c.notes=c.notes||[];c.notes.push({by:me.id,text:'Sent proposal deck to '+c.name+' — “'+w.ctx.context+'”',time:'Just now · PT'});closeModal();toast('Deck sent to '+c.name,'send');state.tab='presentations';if(state.view==='record')renderRecord();else openRecord(c.id);}
function openO365(){const w=state.wizard;const c=w?byId(w.id):null;const me=memberByPersona(state.persona);if(c){c.presentations=c.presentations||[];c.presentations.push({title:w.ctx.context,by:me.id,date:'Just now · PT',status:'In O365',ask:w.ctx.ask});}toast('Opening deck in PowerPoint for the web (Microsoft 365)…','slides');}
function deckHTML(c,w){
 const slides=w.slides.map((k,i)=>{const s=SLIDE_OPTS.find(x=>x.k===k);return '<section style="min-height:88vh;padding:64px;border-bottom:1px solid #e2e8f0;page-break-after:always"><div style="color:#2563EB;font-weight:700;letter-spacing:.12em;text-transform:uppercase;font-size:12px">Zaytuna College · Advancement · Slide '+(i+1)+'</div><h1 style="font-size:44px;color:#0f172a;margin:14px 0 18px;letter-spacing:-.02em">'+s.t+'</h1><p style="font-size:21px;color:#334155;max-width:780px;line-height:1.5">'+esc(slidePreview(k,c,w))+'</p></section>';}).join('');
 return '<!doctype html><html><head><meta charset="utf-8"><title>'+esc(c.name)+' — Proposal</title><style>body{font-family:Segoe UI,system-ui,sans-serif;margin:0;color:#0f172a;background:#fff}</style></head><body>'+slides+'</body></html>';
}

/* ============================ VOICE NOTE ============================ */
function fmtTime(s){return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}
function openVoice(id){state.voice={id:id,sec:0,recording:false,done:false,timer:null,transcript:''};renderVoice();}
function renderVoice(){
 const v=state.voice;const c=byId(v.id);let body,foot;
 if(!v.done){
   body='<div style="text-align:center;padding:12px 0"><button class="recbtn '+(v.recording?'rec':'')+'" onclick="toggleRec()">'+ic(v.recording?'x':'mic',30)+'</button>'
    +'<div id="vnTimer" class="tnum" style="font-weight:800;font-size:24px;margin-top:12px">'+fmtTime(v.sec)+'</div>'
    +'<div class="t-sub">'+(v.recording?'Recording… tap to stop':'Tap the mic to start recording')+'</div></div>';
   foot='<button class="btn btn-sec" onclick="closeModal()">Cancel</button>'+(v.recording?'<button class="btn btn-pri" onclick="stopRec()">Stop & transcribe</button>':'');
 }else{
   body='<div class="note-banner" style="margin-bottom:12px">Auto-transcribed ('+fmtTime(v.sec)+'). Edit before saving.</div><textarea id="vnText" style="min-height:160px">'+esc(v.transcript)+'</textarea>';
   foot='<button class="btn btn-sec" onclick="closeModal()">Discard</button><button class="btn btn-pri" onclick="saveVoice()">'+ic('check',15)+'Save voice note</button>';
 }
 openModal('<div class="modal"><div class="modal-h">'+ic('mic',20)+'<div><b>Voice note</b><div class="sub">'+esc(c.name)+'</div></div><button class="mx" onclick="closeModal()">'+ic('x',18)+'</button></div><div class="modal-b">'+body+'</div><div class="modal-f">'+foot+'</div></div>');
}
function toggleRec(){const v=state.voice;if(v.recording){stopRec();return;}v.recording=true;renderVoice();v.timer=setInterval(()=>{v.sec++;const el=$('#vnTimer');if(el)el.textContent=fmtTime(v.sec);},1000);}
function stopRec(){const v=state.voice;clearInterval(v.timer);v.recording=false;v.done=true;if(v.sec<2)v.sec=37;v.transcript=voiceScript(byId(v.id));renderVoice();}
function voiceScript(c){
 if(c.id==='omar')return 'Met Dr. Siddiqui for coffee in Palo Alto. He is enthusiastic about naming the Graduate Women’s Residence in memory of his mother. Wants floor plans and a naming gift agreement. Capacity confirmed at $1M+. Next steps: send the proposal deck and schedule a campus visit.';
 return 'Quick debrief after meeting '+c.name.split(' ')[0]+'. Strong affinity for Zaytuna’s mission and interest in '+(c.fundInterest||'the Annual Fund')+'. Capacity around '+c.capacity+'. Next: send a tailored proposal and loop in the team.';
}
function saveVoice(){const v=state.voice;const c=byId(v.id);const me=memberByPersona(state.persona);const txt=$('#vnText')?$('#vnText').value:v.transcript;c.voice=c.voice||[];c.voice.push({by:me.id,time:'Just now · PT',dur:fmtTime(v.sec),transcript:txt});closeModal();toast('Voice note saved to '+c.name+'’s record','mic');if(state.view==='record'){state.tab='notes';renderRecord();}}

/* ============================ BOOT ============================ */
function boot(){
 $('.search').innerHTML=ic('search',16)+'<input id="globalSearch" placeholder="Search constituents...">';
 $('#bellBtn').innerHTML=ic('bell',18)+'<span class="badge-dot" id="bellBadge" style="display:none">0</span>';
 $('#bellBtn').onclick=()=>go('inbox');
 const gs=$('#globalSearch');
 gs.addEventListener('keydown',e=>{if(e.key==='Enter'){const q=gs.value.trim().toLowerCase();if(!q)return;const hit=C.find(c=>c.name.toLowerCase().indexOf(q)>=0);if(hit){openRecord(hit.id);gs.value='';}else toast('No constituent matches “'+gs.value+'”');}});
  render();
}
